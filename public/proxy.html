<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux</title>

<link rel="shortcut icon" href="favicon.webp">
<link rel="stylesheet" href="index.css">

<script src="/scram/scramjet.all.js"></script>
<script src="/baremux/index.js"></script>

<script src="register-sw.js" defer></script>
<script src="search.js" defer></script>
<script src="index.js" defer></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<style>
#particles-js {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    position: relative;
    z-index: 1;
}

.logo-wrapper,
#sj-form,
.desc {
    position: relative;
    z-index: 2;
}

.logo {
    width: 200px;
}

#sj-address {
    padding: 12px 16px;
    width: 300px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 16px;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="logo-wrapper" title="Scramjet Logo">
    <img src="logo.png" alt="flux" class="logo">
</div>

<form id="sj-form">
    <input id="sj-search-engine" type="hidden" value="https://baresearch.org/search?q=%s">
    <input id="sj-address" placeholder="Search the web freely">
</form>

<div class="desc">
    <p id="sj-error"></p>
    <pre id="sj-error-code"></pre>
</div>

<script>
particlesJS("particles-js", {
    particles: {
        number: { value: 200, density: { enable: true, value_area: 800 }},
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: {
            value: 0.8,
            random: true,
            anim: { enable: true, speed: 0.6, opacity_min: 0.1, sync: false }
        },
        size: { value: 2, random: true },
        line_linked: { enable: false },
        move: {
            enable: true,
            speed: 0.4,
            random: true,
            out_mode: "out"
        }
    },
    interactivity: {
        detect_on: "canvas",
        events: {
            onhover: { enable: true, mode: "bubble" },
            resize: true
        },
        modes: {
            bubble: {
                distance: 30,
                size: 3.5,
                duration: 1.5,
                opacity: 1,
                speed: 3
            }
        }
    },
    retina_detect: true
});
</script>

</body>
</html>
